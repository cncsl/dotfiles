# =========================
# Core
# =========================
set -g default-shell /bin/zsh
# prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

set -g history-limit 5000

setw -g mode-keys vi

# install tpm first
set -g @plugin 'tmux-plugins/tpm'


# =========================
# Interaction
# =========================
set -g mouse on
set -sg escape-time 10
set -g focus-events on
set -g set-clipboard on
# interaction between tmux and programs
set -g allow-passthrough on
set -g monitor-activity on
set -g visual-activity off

set -g focus-events on
set-hook -g pane-focus-in \
  "run-shell 'im-select com.apple.keylayout.ABC'"


# =========================
# Window
# =========================
set -g base-index 1
set -g renumber-windows on
bind n new-window -c '#{pane_current_path}'


# =========================
# Pane
# =========================
setw -g pane-base-index 1
bind | split-window -h -c'#{pane_current_path}'
bind _ split-window -v -c'#{pane_current_path}'
bind > swap-pane -D
bind < swap-pane -U
unbind x
bind q if-shell -F '#{==:#{pane_current_command},zsh}' \
    'kill-pane' \
    'confirm-before -p "kill running pane #{pane_current_command}? (y/n)" kill-pane'
set -g @plugin 'mrjones2014/smart-splits.nvim'
set -g @smart-splits_no_wrap '' # to disable wrapping. (any value disables wrapping)
set -g @smart-splits_move_left_key  'C-h' # key-mapping for navigation.
set -g @smart-splits_move_down_key  'C-j' #  --"--
set -g @smart-splits_move_up_key    'C-k' #  --"--
set -g @smart-splits_move_right_key 'C-l' #  --"--
set -g @smart-splits_resize_left_key  'M-h' # key-mapping for resizing.
set -g @smart-splits_resize_right_key 'M-l' #  --"--
set -g @smart-splits_resize_step_size '3' # change the step-size for resizing.
# input for all panes
bind b setw synchronize-panes


# =========================
# Other plugin
# =========================
set -g @plugin 'tmux-plugins/tmux-sensible'
# fastcopy
set -g @plugin 'abhinav/tmux-fastcopy'
set -g @fastcopy-action 'tmux load-buffer -w -'


# =========================
# Session
# =========================


# =========================
# Appearance
# =========================
# TokyoNight  theme
set -g mode-style "fg=#7aa2f7,bg=#3b4261"

set -g message-style "fg=#7aa2f7,bg=#3b4261"
set -g message-command-style "fg=#7aa2f7,bg=#3b4261"

set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"

set -g status "on"
set -g status-justify "left"

set -g status-style "fg=#7aa2f7,bg=#1f2335"
set -g status-position "top"
set -g status-left-length "100"
set -g status-right-length "100"

set -g status-left-style NONE
set -g status-right-style NONE

set -g status-left "#[fg=#1d202f,bg=#{?client_prefix,#9ece6a,#{?pane_in_mode,#bb9af7,#{?pane_synchronized,#f7768e,#7aa2f7}}},bold]#{?client_prefix, WAIT ,#{?pane_in_mode, COPY ,#{?pane_synchronized, SYNC , NORMAL }}}#[fg=#{?client_prefix,#9ece6a,#{?pane_in_mode,#bb9af7,#{?pane_synchronized,#f7768e,#7aa2f7}}},bg=#3b4261]#[fg=#7aa2f7,bg=#3b4261,bold] #S #[fg=#3b4261,bg=#1f2335,nobold,nounderscore,noitalics]"
set -g status-right "#[fg=#{?client_prefix,#9ece6a,#{?pane_in_mode,#bb9af7,#{?pane_synchronized,#f7768e,#7aa2f7}}},bg=#1f2335,nobold,nounderscore,noitalics]#[fg=#1d202f,bg=#{?client_prefix,#9ece6a,#{?pane_in_mode,#bb9af7,#{?pane_synchronized,#f7768e,#7aa2f7}}},bold] #h "

setw -g window-status-activity-style "underscore,fg=#a9b1d6,bg=#1f2335"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#a9b1d6,bg=#1f2335"
setw -g window-status-format "#[fg=#1f2335,bg=#1f2335,nobold,nounderscore,noitalics]#[default] #I  #W #F #[fg=#1f2335,bg=#1f2335,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#1f2335,bg=#3b4261,nobold,nounderscore,noitalics]#[fg=#7aa2f7,bg=#3b4261,bold] #I  #W #F #[fg=#3b4261,bg=#1f2335,nobold,nounderscore,noitalics]"

# for undercurl
set -g default-terminal "${TERM}"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
if "test ! -d ~/.config/tmux/plugins/tpm" \
    "run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm'"
run '~/.config/tmux/plugins/tpm/tpm'
